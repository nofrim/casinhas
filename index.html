<!DOCTYPE html>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Engenharia Campo v7.0 - Auto-Cronológico</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --apple-blue: #007AFF; --apple-green: #34C759; --apple-bg: #F2F2F7; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 10px; background: var(--apple-bg); padding-bottom: 120px; }
        .dashboard { background: white; padding: 15px; border-radius: 15px; position: sticky; top: 10px; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .search-box { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ccc; font-size: 16px; margin-bottom: 10px; box-sizing: border-box; }
        .card { background: white; margin-bottom: 12px; border-radius: 14px; padding: 15px; border-left: 6px solid #FFCC00; transition: all 0.3s ease; }
        .card.concluido { border-left-color: var(--apple-green); background: #f9fff9; order: 1; }
        .time-badge { font-size: 0.7rem; color: #888; float: right; }
        .name-link { color: var(--apple-blue); text-decoration: none; font-size: 1.1rem; font-weight: 600; display: block; margin: 5px 0; }
        textarea { width: 100%; border-radius: 8px; border: 1px solid #ddd; padding: 10px; margin-top: 8px; box-sizing: border-box; font-size: 14px; }
        .btn-status { width: 100%; padding: 12px; border: none; border-radius: 10px; margin-top: 10px; font-weight: bold; background: #E5E5EA; }
        .btn-status.done { background: var(--apple-green); color: white; }
        .btn-pdf { width: 100%; padding: 12px; background: #000; color: white; border-radius: 10px; font-weight: bold; border: none; }
    </style>
</head>
<body>

<div class="dashboard">
    <input type="text" id="busca" class="search-box" placeholder="🔍 Buscar por nome ou número..." oninput="render()">
    <button onclick="gerarPDF()" class="btn-pdf">📄 Gerar Relatório na Ordem de Visita</button>
</div>

function init() {
    let db = localStorage.getItem('v7_db');
    if(!db) {
        const initialSetup = listaMestre.map(item => ({
            ...item, status: 'pendente', obs: '', timestamp: 0
        }));
        localStorage.setItem('v7_db', JSON.stringify(initialSetup));
    }
    render();
}

function toggle(id) {
    let db = JSON.parse(localStorage.getItem('v7_db'));
    let idx = db.findIndex(x => x.id === id);
    
    if(db[idx].status === 'pendente') {
        db[idx].status = 'concluido';
        db[idx].timestamp = Date.now(); // GRAVA DATA E HORA EXATA DO CLIQUE
    } else {
        db[idx].status = 'pendente';
        db[idx].timestamp = 0;
    }
    
    localStorage.setItem('v7_db', JSON.stringify(db));
    render();
}

function salvarObs(id, texto) {
    let db = JSON.parse(localStorage.getItem('v7_db'));
    let idx = db.findIndex(x => x.id === id);
    db[idx].obs = texto;
    localStorage.setItem('v7_db', JSON.stringify(db));
}

function render() {
    const container = document.getElementById('app-lista');
    const busca = document.getElementById('busca').value.toLowerCase();
    let db = JSON.parse(localStorage.getItem('v7_db'));

    // REORGANIZAÇÃO AUTOMÁTICA: 
    // 1. Pendentes ficam em ordem alfabética.
    // 2. Concluídos vão para o fim da lista, ordenados pela HORA DO CLIQUE.
    db.sort((a, b) => {
        if (a.status === 'concluido' && b.status === 'concluido') return a.timestamp - b.timestamp;
        if (a.status === 'concluido') return 1;
        if (b.status === 'concluido') return -1;
        return a.nome.localeCompare(b.nome);
    });

    container.innerHTML = db.filter(u => u.nome.toLowerCase().includes(busca) || u.id.toString().includes(busca)).map(u => `
        <div class="card ${u.status}">
            <span class="time-badge">${u.timestamp > 0 ? new Date(u.timestamp).toLocaleTimeString() : ''}</span>
            <span class="name-link">#${u.id} - ${u.nome}</span>
            <small>${u.c}</small>
            <textarea placeholder="Ocorrências..." onchange="salvarObs(${u.id}, this.value)">${u.obs}</textarea>
            <button class="btn-status ${u.status === 'concluido' ? 'done' : ''}" onclick="toggle(${u.id})">
                ${u.status === 'concluido' ? '✅ VISITADO' : 'MARCAR COMO VISITADO'}
            </button>
        </div>
    `).join('');
}

function gerarPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    let db = JSON.parse(localStorage.getItem('v7_db'));
    
    // Filtra e ordena apenas os visitados pela hora do clique para o PDF
    let visitados = db.filter(x => x.status === 'concluido').sort((a, b) => a.timestamp - b.timestamp);
    
    doc.setFontSize(16);
    doc.text("Relatório Cronológico de Vistorias", 15, 15);
    doc.setFontSize(10);
    
    let y = 30;
    visitados.forEach((u, index) => {
        if(y > 280) { doc.addPage(); y = 20; }
        let hora = new Date(u.timestamp).toLocaleTimeString();
        doc.text(`${index + 1}. [${hora}] #${u.id} - ${u.nome}`, 15, y);
        doc.text(`   Ocorrência: ${u.obs || 'Nenhuma'}`, 15, y + 5);
        y += 15;
    });
    
    doc.save("vistorias_real_time.pdf");
}

window.onload = init;
