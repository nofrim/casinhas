<!DOCTYPE html>

    <meta charset="UTF-8">

    <title>Engenharia Campo v8.0 - Roteiro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --apple-blue: #007AFF; --apple-green: #34C759; --apple-bg: #F2F2F7; --apple-red: #FF3B30; }
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 10px; background: var(--apple-bg); padding-bottom: 120px; }
        
        .dashboard { background: white; padding: 15px; border-radius: 15px; position: sticky; top: 10px; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
        .stat-card { background: #f8f8f8; padding: 10px; border-radius: 10px; text-align: center; border: 1px solid #eee; }
        .stat-value { display: block; font-size: 1.4rem; font-weight: 800; color: var(--apple-blue); }
        .stat-label { font-size: 0.7rem; color: #666; text-transform: uppercase; }
        
        .search-box { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ccc; font-size: 16px; margin-bottom: 10px; box-sizing: border-box; }
        
        .card { background: white; margin-bottom: 12px; border-radius: 14px; padding: 15px; border-left: 6px solid #FFCC00; position: relative; }
        .card.concluido { border-left-color: var(--apple-green); background: #f9fff9; opacity: 0.8; }
        
        .btn-gps { 
            float: right; background: var(--apple-blue); color: white; border: none; 
            padding: 10px 16px; border-radius: 8px; font-weight: bold; text-decoration: none; font-size: 12px;
            box-shadow: 0 2px 5px rgba(0,122,255,0.3);
        }
        
        .name-link { color: #1c1c1e; font-size: 1.1rem; font-weight: 700; display: block; margin-top: 5px; }
        .comunidade { color: #8e8e93; font-size: 0.85rem; font-weight: 600; display: block; margin-bottom: 8px; }
        
        textarea { width: 100%; border-radius: 8px; border: 1px solid #ddd; padding: 10px; margin-top: 10px; box-sizing: border-box; font-size: 14px; min-height: 70px; resize: none; }
        
        .btn-status { width: 100%; padding: 14px; border: none; border-radius: 10px; margin-top: 10px; font-weight: bold; background: #E5E5EA; font-size: 15px; }
        .btn-status.done { background: var(--apple-green); color: white; }
        
        .btn-pdf { width: 100%; padding: 12px; background: #000; color: white; border-radius: 10px; font-weight: bold; border: none; margin-bottom: 5px; }
        .btn-reset { width: 100%; padding: 8px; background: transparent; color: var(--apple-red); border: none; font-size: 11px; font-weight: bold; }
        .time-badge { background: #555; color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; margin-bottom: 5px; display: inline-block;}
    </style>
</head>
<body>

<div class="dashboard">

        <div class="stat-card">

        </div>
        <div class="stat-card">

    <button onclick="gerarPDF()" class="btn-pdf">📄 Gerar Relatório Final PDF</button>

function init() {
    let db = localStorage.getItem('v80_db');
    if(!db) {
        // Inicializa com o roteiro otimizado
        const setup = roteiroOtimizado.map(item => ({...item, status: 'pendente', obs: '', ts: 0}));
        localStorage.setItem('v80_db', JSON.stringify(setup));
    }
    render();
}

function toggle(id) {
    let db = JSON.parse(localStorage.getItem('v80_db'));
    let idx = db.findIndex(x => x.id === id);
    if(db[idx].status === 'pendente') {
        db[idx].status = 'concluido';
        db[idx].ts = Date.now();
    } else {
        db[idx].status = 'pendente';
        db[idx].ts = 0;
    }
    localStorage.setItem('v80_db', JSON.stringify(db));
    render();
}

function salvarObs(id, texto) {
    let db = JSON.parse(localStorage.getItem('v80_db'));
    let idx = db.findIndex(x => x.id === id);
    db[idx].obs = texto;
    localStorage.setItem('v80_db', JSON.stringify(db));
}

function render() {
    const container = document.getElementById('app-lista');
    const txt = document.getElementById('busca').value.toLowerCase();
    let db = JSON.parse(localStorage.getItem('v80_db'));

    // Estatísticas
    const total = db.length;
    const feitos = db.filter(x => x.status === 'concluido').length;
    document.getElementById('progresso-cont').innerText = `${feitos}/${total}`;
    document.getElementById('progresso-pct').innerText = `${Math.round((feitos/total)*100)}%`;

    // A mágica: Se não houver busca, mantém a ORDEM DO ROTEIRO
    // Os concluídos descem para o fim da lista conforme você marca
    db.sort((a, b) => {
        if (a.status === 'concluido' && b.status === 'concluido') return a.ts - b.ts;
        if (a.status === 'concluido') return 1;
        if (b.status === 'concluido') return -1;
        // Mantém a ordem do array roteiroOtimizado para os pendentes
        return roteiroOtimizado.findIndex(x => x.id === a.id) - roteiroOtimizado.findIndex(x => x.id === b.id);
    });

    let html = '';
    db.forEach(u => {
        if(!u.nome.toLowerCase().includes(txt) && !u.c.toLowerCase().includes(txt)) return;
        
        let horaFormatada = u.ts > 0 ? new Date(u.ts).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '';
        let urlGps = `https://www.google.com/maps/dir/?api=1&destination=${u.lat},${u.lon}&travelmode=driving`;

        html += `
            <div class="card ${u.status}">
                <a href="${urlGps}" target="_blank" class="btn-gps">📍 MAPA</a>
                ${u.ts > 0 ? `<span class="time-badge">CONCLUÍDO ÀS ${horaFormatada}</span>` : ''}
                <span class="name-link">#${u.id} - ${u.nome.toUpperCase()}</span>
                <span class="comunidade">${u.c}</span>
                <textarea placeholder="Ocorrências..." oninput="salvarObs(${u.id}, this.value)">${u.obs}</textarea>
                <button class="btn-status ${u.status === 'concluido' ? 'done' : ''}" onclick="toggle(${u.id})">
                    ${u.status
